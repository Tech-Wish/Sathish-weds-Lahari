<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sathish & Sneha | Our Wedding</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --accent: #b8738a;
      --bg: linear-gradient(135deg, #fdf4f5 0%, #fffbf0 100%);
      --card-bg: rgba(255, 255, 255, 0.92);
      --text: #4a4a4a;
      --border-radius: 24px;
      --shadow: 0 12px 30px rgba(0, 0, 0, 0.06);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: 'Montserrat', sans-serif;
      background: var(--bg);
      background-attachment: fixed;
      color: var(--text);
      line-height: 1.7;
      padding-bottom: 40px;
    }

    .hero {
      height: 100vh;
      background: linear-gradient(rgba(0,0,0,0.15), rgba(0,0,0,0.15)), url('PHOTO1.jpg') center/cover no-repeat;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      text-align: center;
      color: white;
      position: relative;
      overflow: hidden;
      padding: 20px;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(0,0,0,0.35) 0%, rgba(0,0,0,0.1) 100%);
      pointer-events: none;
    }

    .hero-content {
      z-index: 1;
      max-width: 700px;
      padding: 0 20px;
    }

    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: 3rem;
      margin: 0 0 10px;
      letter-spacing: 2px;
      font-weight: 700;
      text-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    .hero p {
      font-size: 1rem;
      margin: 0 0 24px;
      font-weight: 300;
    }

    .btn {
      display: inline-block;
      padding: 13px 34px;
      border: 1px solid rgba(255, 255, 255, 0.8);
      border-radius: 30px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.4s ease;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(4px);
      color: white;
      text-decoration: none;
      font-size: 13px;
    }

    .btn:hover {
      background: rgba(255, 255, 255, 0.3);
      color: black;
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
    }

    .section {
      padding: 60px 14px;
      max-width: 900px;
      margin: auto;
      text-align: center;
      position: relative;
      z-index: 2;
    }

    .card {
      background: var(--card-bg);
      backdrop-filter: blur(10px);
      border-radius: var(--border-radius);
      border: 1px solid rgba(255, 255, 255, 0.6);
      padding: 28px 16px 24px;
      box-shadow: var(--shadow);
      margin: 0 auto;
      max-width: 900px;
    }

    .section h2 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      color: var(--accent);
      margin-bottom: 22px;
      font-style: italic;
    }

    .video iframe {
      width: 100%;
      aspect-ratio: 16 / 9;
      border-radius: 18px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.08);
      border: 4px solid rgba(255, 255, 255, 0.8);
    }

    .mobile-gallery {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
    }

    .main-arch {
      width: 100%;
      max-width: 290px;
      height: 430px;
      object-fit: cover;
      border-radius: 170px 170px 28px 28px;
      border: 1px solid #c8beb0;
      padding: 14px;
      background: rgba(255, 255, 255, 0.35);
      box-shadow: 0 12px 30px rgba(0,0,0,0.08);
    }

    .bottom-arch {
      width: 190px;
      height: 220px;
      object-fit: cover;
      border-radius: 100px 100px 0 0;
      box-shadow: 0 10px 24px rgba(0,0,0,0.1);
    }

    .right-note {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      text-align: center;
      max-width: 250px;
    }

    .small-heart {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(145deg, #ff7aa8, #ff406c);
      display: grid;
      place-items: center;
      color: #fff;
      box-shadow: 0 12px 24px rgba(255,64,108,.24);
      font-size: 18px;
    }

    .right-note p {
      font-size: 16px;
      line-height: 1.4;
      font-weight: 500;
    }

    .small-circle {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      box-shadow: 0 10px 22px rgba(0,0,0,.12);
      border: 4px solid rgba(255,255,255,.75);
    }

    .caption {
      font-size: 14px;
      font-weight: 600;
      margin-top: 2px;
    }

    .services {
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: center;
      margin-top: 8px;
      margin-bottom: 8px;
    }

    .services p {
      font-size: 15px;
      border-bottom: 1px solid #000;
      width: 170px;
      padding-bottom: 6px;
    }

    .extra-gallery {
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: 100%;
      align-items: center;
      margin-top: 4px;
    }

    .extra-gallery img {
      width: 100%;
      max-width: 320px;
      height: 220px;
      object-fit: cover;
      border-radius: 24px;
      box-shadow: 0 10px 24px rgba(0,0,0,0.08);
    }
    iframe {
  width: 100%;
  aspect-ratio: 16/9;
  border-radius: 18px;
  border: none;
  box-shadow: 0 12px 30px rgba(0,0,0,0.1);
}
  </style>
</head>
<body>

     <div class="section" id="story">
    <div class="card">
      <h2>Sathish & Sneha</h2>
        <iframe 
  src="https://www.youtube.com/embed/h4wNMUPqc-I?rel=0&modestbranding=1" 
  allow="autoplay; fullscreen"
  allowfullscreen>
</iframe>

    </div>
  </div>

  <div class="section">
    <div class="card">
      <h2>Love in Every Frame</h2>

      <div class="mobile-gallery">
        <img src="p3.jpg" alt="Moment 1" class="main-arch" />

        <div class="right-note">
          <div class="small-heart">❤</div>
          <p>A Classic Wedding With a Tropical Twist</p>
        </div>

      
        <div class="extra-gallery">
          <img src="p2.JPG" alt="Moment 3"/>
          <img src="p4.jpg" alt="Moment 2"/>
          <img src="p5.jpg" alt="Moment 4" />
          <img src="p6.jpg" alt="Moment 5" />
          <img src="p1.jpg" alt="Moment 6" />
        </div>
      </div>
    </div>
  </div>


  </div>
</body>
</html>
